name: AssetResolver-CI-CD

trigger: none
pr: none

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'AI DocClassExt PRO' # set this pipeline variable to an Azure service connection
  webAppName: 'srbwebpluginassetresolver' # override if needed

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '9.0.x'
    - script: dotnet restore src/plugins/DocumentIA.AssetResolver/DocumentIA.AssetResolver.csproj
      displayName: 'dotnet restore'
    - script: dotnet build src/plugins/DocumentIA.AssetResolver/DocumentIA.AssetResolver.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'dotnet build'
    - script: dotnet publish src/plugins/DocumentIA.AssetResolver/DocumentIA.AssetResolver.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish --no-build
      displayName: 'dotnet publish'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
        ArtifactName: 'AssetResolverPublish'
        publishLocation: 'Container'

- stage: Deploy
  displayName: Deploy
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: Deploy
    displayName: Deploy to Azure Web App
    environment: 'assetresolver'
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: AssetResolverPublish
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/AssetResolverPublish/publish'
