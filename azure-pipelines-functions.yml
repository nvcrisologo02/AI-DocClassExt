name: Functions-CI-CD

trigger: none
pr: none

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'AI DocClassExt'
  functionAppName: 'srbappprodocai'
  azureResourceGroup: 'SRBRGDOCSAIPROD'
  # CU Resiliencia baseline (post-2026-06-01)
  cuMaxConcurrentCalls: '4'
  cuHardTimeoutSeconds: '90'
  cuEnableCircuitBreaker: 'true'
  cuCircuitBreakerFailureThreshold: '5'
  cuCircuitBreakerOpenSeconds: '45'
  cuMaxRetries: '3'
  cuInitialRetryDelayMs: '500'
  promptTracingEnabled: 'true'
  promptTracingIncludePromptText: 'true'
  promptTracingMaxPromptTextChars: '20000'
  # Durable Functions concurrency (alineado con CU limiter)
  maxConcurrentActivityFunctions: '4'
  maxConcurrentOrchestratorFunctions: '4'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.0.x'
    - script: dotnet restore src/backend/DocumentIA.Functions/DocumentIA.Functions.csproj
      displayName: 'dotnet restore'
    - script: dotnet build src/backend/DocumentIA.Functions/DocumentIA.Functions.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'dotnet build'
    - script: dotnet publish src/backend/DocumentIA.Functions/DocumentIA.Functions.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish --no-build
      displayName: 'dotnet publish'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
        ArtifactName: 'FunctionsPublish'
        publishLocation: 'Container'

- stage: Deploy
  displayName: Deploy
  dependsOn: Build
  condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/develop')))
  jobs:
  - deployment: Deploy
    displayName: Deploy to Azure Functions
    environment: 'prod'
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - download: current
            artifact: FunctionsPublish
          - task: AzureFunctionApp@1
            displayName: 'Deploy to Azure Function App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'functionApp'
              appName: '$(functionAppName)'
              package: '$(Pipeline.Workspace)/FunctionsPublish'
          - task: AzureCLI@2
            displayName: 'Set CU Resiliencia App Settings (post-deploy validation)'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "Aplicando App Settings de resiliencia CU..."
                
                $settings = @(
                  "Extraction__AzureContentUnderstanding__MaxConcurrentCalls=$(cuMaxConcurrentCalls)",
                  "Extraction__AzureContentUnderstanding__HardTimeoutSeconds=$(cuHardTimeoutSeconds)",
                  "Extraction__AzureContentUnderstanding__EnableCircuitBreaker=$(cuEnableCircuitBreaker)",
                  "Extraction__AzureContentUnderstanding__CircuitBreakerFailureThreshold=$(cuCircuitBreakerFailureThreshold)",
                  "Extraction__AzureContentUnderstanding__CircuitBreakerOpenSeconds=$(cuCircuitBreakerOpenSeconds)",
                  "Extraction__AzureContentUnderstanding__MaxRetries=$(cuMaxRetries)",
                  "Extraction__AzureContentUnderstanding__InitialRetryDelayMs=$(cuInitialRetryDelayMs)",
                  "PromptTracing__Enabled=$(promptTracingEnabled)",
                  "PromptTracing__IncludePromptText=$(promptTracingIncludePromptText)",
                  "PromptTracing__MaxPromptTextChars=$(promptTracingMaxPromptTextChars)"
                )

                & .\scripts\ensure-app-settings.ps1 `
                  -AppKind functionapp `
                  -ResourceGroup "$(azureResourceGroup)" `
                  -Name "$(functionAppName)" `
                  -Settings $settings

                Write-Host "Validando que todas las variables se han aplicado..."
                
                $requiredKeys = @(
                  "Extraction__AzureContentUnderstanding__MaxConcurrentCalls",
                  "Extraction__AzureContentUnderstanding__HardTimeoutSeconds",
                  "Extraction__AzureContentUnderstanding__EnableCircuitBreaker",
                  "Extraction__AzureContentUnderstanding__CircuitBreakerFailureThreshold",
                  "Extraction__AzureContentUnderstanding__CircuitBreakerOpenSeconds",
                  "Extraction__AzureContentUnderstanding__MaxRetries",
                  "Extraction__AzureContentUnderstanding__InitialRetryDelayMs",
                  "PromptTracing__Enabled",
                  "PromptTracing__IncludePromptText",
                  "PromptTracing__MaxPromptTextChars"
                )
                
                $appliedSettings = az functionapp config appsettings list `
                  --resource-group "$(azureResourceGroup)" `
                  --name "$(functionAppName)" `
                  --query "[?starts_with(name, 'Extraction__AzureContentUnderstanding') || starts_with(name, 'PromptTracing__')].{name: name, value: value}" `
                  -o json | ConvertFrom-Json
                
                $appliedNames = $appliedSettings | Select-Object -ExpandProperty name
                $missingKeys = @()
                
                foreach ($key in $requiredKeys) {
                  if ($key -notin $appliedNames) {
                    $missingKeys += $key
                  }
                }
                
                if ($missingKeys.Count -gt 0) {
                  Write-Host "##vso[task.logissue type=error]Faltan variables requeridas: $($missingKeys -join ', ')"
                  exit 1
                } else {
                  Write-Host "✓ Todas las variables de resiliencia CU están aplicadas correctamente"
                  $appliedSettings | ForEach-Object { Write-Host "  ✓ $($_.name) = $($_.value)" }
                }
