trigger:
- '*'

pool:
  vmImage: ubuntu-latest

variables:
- group: github-secrets

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- script: |
    set -e

    git config --global user.email "sync-bot@company.local"
    git config --global user.name "AzureDevOps Sync Bot"

    git remote remove github || true
    git remote add github https://$(GITHUB_PAT)@github.com/nvcrisologo02/AI-DocClassExt.git

    # Empujar todas las ramas y tags (SIN borrar default branch)
    git push github --all
    git push github --tags
  displayName: 'Sync Azure DevOps → GitHub'
