trigger:
  branches:
    include:
      - main

variables:
  - name: AZURE_SERVICE_CONNECTION
    value: AI DocClassExt
  - name: AZURE_FUNCTIONS_APP_NAME
    value: srbappprodocai
  - name: AZURE_RESOURCE_GROUP
    value: SRBRGDOCSAIPROD
  - name: KEY_VAULT_NAME
    value: srbkvprodocai
  - name: buildConfiguration
    value: Release
  - name: solutionPath
    value: src/backend/DocumentIA.sln
  - name: functionsProject
    value: src/backend/DocumentIA.Functions/DocumentIA.Functions.csproj
  - name: COMPLETAR_GDC_HTTP_BASIC_USERNAMEProject
    value: src/frontend/DocumentIA.Admin/DocumentIA.Admin.csproj
  - name: testsProject
    value: src/backend/DocumentIA.Tests.Unit/DocumentIA.Tests.Unit.csproj

pool:
  vmImage: windows-latest

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildJob
        displayName: Build solution
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 9 SDK
            inputs:
              packageType: sdk
              version: 9.x

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: $(solutionPath)

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: $(solutionPath)
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Test
            inputs:
              command: test
              projects: $(testsProject)
              arguments: --configuration $(buildConfiguration) --no-build

          - task: DotNetCoreCLI@2
            displayName: Publish Functions
            inputs:
              command: publish
              publishWebProjects: false
              projects: $(functionsProject)
              arguments: --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/functions
              zipAfterPublish: false
              modifyOutputPath: false

          - task: DotNetCoreCLI@2
            displayName: Publish Admin
            inputs:
              command: publish
              publishWebProjects: false
              projects: $(COMPLETAR_GDC_HTTP_BASIC_USERNAMEProject)
              arguments: --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/COMPLETAR_GDC_HTTP_BASIC_USERNAME
              zipAfterPublish: false
              modifyOutputPath: false

          - task: PublishBuildArtifacts@1
            displayName: Upload artifact - functions
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/functions
              ArtifactName: drop-functions

          - task: PublishBuildArtifacts@1
            displayName: Upload artifact - COMPLETAR_GDC_HTTP_BASIC_USERNAME
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/COMPLETAR_GDC_HTTP_BASIC_USERNAME
              ArtifactName: drop-COMPLETAR_GDC_HTTP_BASIC_USERNAME

  - stage: RunMigrations
    displayName: Run Database Migrations
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: MigrateJob
        displayName: Apply EF Core migrations
        pool:
          vmImage: windows-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 9 SDK
            inputs:
              packageType: sdk
              version: 9.x

          - task: AzureKeyVault@2
            displayName: Fetch SQL connection string from Key Vault
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              KeyVaultName: $(KEY_VAULT_NAME)
              SecretsFilter: SqlConnectionString
              RunAsPreJob: false

          - pwsh: |
              $ErrorActionPreference = 'Stop'

              Write-Host "Installing dotnet-ef..."
              dotnet tool update --global dotnet-ef --version 9.* || dotnet tool install --global dotnet-ef --version 9.*

              $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

              Write-Host "Dotnet info:"
              dotnet --info

              Write-Host "dotnet-ef version:"
              dotnet ef --version

              Write-Host "Restoring solution..."
              dotnet restore $(solutionPath)

              Write-Host "Building solution..."
              dotnet build $(solutionPath) --configuration $(buildConfiguration) --no-restore

              Write-Host "Applying EF Core migrations against database..."
              dotnet ef database update `
                --project src/backend/DocumentIA.Data/ `
                --startup-project src/backend/DocumentIA.Functions/ `
                --configuration $(buildConfiguration) `
                --connection "$(SqlConnectionString)"
            displayName: Apply EF Core migrations

  - stage: DeployFunctions
    displayName: Deploy Functions
    dependsOn: RunMigrations
    condition: succeeded()
    jobs:
      - deployment: DeployFunctionsJob
        displayName: Deploy to srbappprodocai
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: drop-functions

                - task: AzureFunctionApp@2
                  displayName: Deploy Function App
                  inputs:
                    connectedServiceNameARM: $(AZURE_SERVICE_CONNECTION)
                    appType: functionApp
                    appName: $(AZURE_FUNCTIONS_APP_NAME)
                    package: $(Pipeline.Workspace)/drop-functions
                    deploymentMethod: zipDeploy

                - task: AzureCLI@2
                  displayName: Set Function App settings (Key Vault mode)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: pscore
                    scriptLocation: inlineScript
                    inlineScript: |
                      az functionapp config appsettings set --resource-group "$(AZURE_RESOURCE_GROUP)" --name "$(AZURE_FUNCTIONS_APP_NAME)" --settings SecretsSource=AzureVault KeyVaultName=$(KEY_VAULT_NAME) RunDatabaseMigrationsOnStartup=false "AzureWebJobsStorage=@Microsoft.KeyVault(VaultName=$(KEY_VAULT_NAME);SecretName=AzureWebJobsStorage)" "SqlConnectionString=@Microsoft.KeyVault(VaultName=$(KEY_VAULT_NAME);SecretName=SqlConnectionString)" --only-show-errors --output none
                      az functionapp config appsettings delete --resource-group "$(AZURE_RESOURCE_GROUP)" --name "$(AZURE_FUNCTIONS_APP_NAME)" --setting-names AzureWebJobsStorage__accountName AzureWebJobsStorage__credential --only-show-errors --output none

                - task: AzureCLI@2
                  displayName: Resolve Function App host name
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: pscore
                    scriptLocation: inlineScript
                    inlineScript: |
                      $hostName = az functionapp show --resource-group "$(AZURE_RESOURCE_GROUP)" --name "$(AZURE_FUNCTIONS_APP_NAME)" --query defaultHostName -o tsv
                      if (-not $hostName) { throw "No se pudo resolver defaultHostName de $(AZURE_FUNCTIONS_APP_NAME)" }
                      Write-Host "##vso[task.setvariable variable=FUNCTIONS_HOST_NAME]$hostName"

                - task: PowerShell@2
                  displayName: Smoke test Functions endpoint
                  inputs:
                    targetType: filePath
                    filePath: scripts/smoke-test-functions.ps1
                    arguments: -HostName $(FUNCTIONS_HOST_NAME)
                    pwsh: true

  - stage: DeployAdmin
    displayName: Deploy Admin Blazor
    dependsOn: Build
    condition: false
    jobs:
      - deployment: DeployAdminJob
        displayName: Deploy to srbwebCOMPLETAR_GDC_HTTP_BASIC_USERNAMEprodocai
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop-COMPLETAR_GDC_HTTP_BASIC_USERNAME

                - task: AzureWebApp@1
                  displayName: Deploy Admin Web App
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appType: webApp
                    appName: srbwebCOMPLETAR_GDC_HTTP_BASIC_USERNAMEprodocai
                    package: $(Pipeline.Workspace)/drop-COMPLETAR_GDC_HTTP_BASIC_USERNAME
                    deploymentMethod: zipDeploy
