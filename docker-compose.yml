version: '3.8'

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    hostname: azurite
    restart: unless-stopped
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "20000:10000"  # Blob (remapped from 10000)
      - "20001:10001"  # Queue (remapped from 10001)
      - "20002:10002"  # Table (remapped from 10002)
    volumes:
      - azurite_data:/data

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: documentia-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=COMPLETAR_SQL_PASSWORD
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  azurite_data:
    external: true
    name: documento-ia-clasificacion-mvp_azurite-data
  sql_data:
    driver: local
