version: '3.8'

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    hostname: azurite
    restart: unless-stopped
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: documentia-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=COMPLETAR_SQL_PASSWORD
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  azurite_data:
    driver: local
  sql_data:
    driver: local
